{% for user in friends %}
<!-- Friends -->
<div class="user d-flex justify-content-between align-items-center">
	<!-- User name  -->
	<div>
		<div class="user-name">{{ user.username }}</div>
	</div>
	<!-- User status  -->
	<div class="d-flex justify-content-end">
		<!-- TODO: Improve this adding status data and managing status colors in javascript or css file -->
		<div class="user-button user-status" style="{% if friend.status == 'online' %}color: green;{% elif friend.status == 'offline' %}color: red;{% else %}color: orange;{% endif %}">&#8226;</div>
	</div>
</div>
{% endfor %}

<!-- non friends -->
{% for user in non_friends %}
<!-- User -->
<div class="user d-flex justify-content-between align-items-center">
	<!-- User name -->
	<div class="user-name" id="{{ user.id }}">{{ user.username }}</div>
	<!-- User add button -->
	<button class="btn btn-outline-primary add-button" type="submit">Add</button>
</div>
{% endfor %}
